<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nokia Snake II • kierz.io</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&amp;family=VT323&amp;display=swap');
    
    :root {
      --lcd-green: #b2c0a8;
      --lcd-dark: #0f120f;
      --lcd-bezel: #1a1c20;
      --phone-body: #c5c8cb;
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(180deg, #0a0118 0%, #1a1428 100%);
      font-family: 'VT323', 'Orbitron', monospace;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 1.8rem;
      margin: 0 0 4px;
      color: #00c4d4;
      letter-spacing: 3px;
    }
    
    .header p {
      font-size: 0.95rem;
      opacity: 0.7;
      margin: 0;
    }
    
    /* Authentic Nokia 3310 phone shell */
    .phone-container {
      width: 380px;
      background: linear-gradient(145deg, #e8eaed 0%, #b8bbc0 35%, #8a8d92 65%, #5f6368 100%);
      border-radius: 2.75rem;
      border: 1px solid #6b6f75;
      box-shadow: 
        0 25px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -2px 4px rgba(0,0,0,0.4);
      padding: 18px 18px 22px;
      position: relative;
      overflow: hidden;
    }
    
    .phone-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%, rgba(0,0,0,0.15) 100%);
      border-radius: 2.75rem;
      pointer-events: none;
    }
    
    /* Top speaker grille */
    .speaker {
      display: flex;
      justify-content: center;
      gap: 3px;
      padding: 12px 0 8px;
    }
    
    .speaker div {
      width: 4px;
      height: 14px;
      background: #3a3d42;
      border-radius: 999px;
    }
    
    /* Nokia branding below screen */
    .nokia-brand {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #3a3d42;
      margin: 6px 0 10px;
      user-select: none;
    }
    
    /* LCD screen assembly */
    .lcd-frame {
      background: #2a2d31;
      border: 6px solid #1a1c20;
      border-radius: 14px;
      padding: 6px;
      box-shadow: inset 0 0 0 1px #0a0c0a;
    }
    
    .lcd-inner {
      background: #0f120f;
      border: 3px solid #0a0c0a;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    .lcd-header {
      background: #a8b89a;
      padding: 4px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(15,18,15,0.4);
      font-size: 11px;
      font-weight: 700;
      color: #1a201a;
      letter-spacing: 1.5px;
    }
    
    .lcd-screen {
      background: #b2c0a8;
      padding: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    canvas {
      image-rendering: pixelated;
      border: 1px solid rgba(26,32,26,0.3);
      background: #b2c0a8;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.15);
    }
    
    /* Controls */
    .controls {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    
    .dpad {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 4px;
      width: 168px;
      height: 168px;
    }
    
    .dpad-btn {
      background: linear-gradient(145deg, #d1d4d8, #9fa3a8);
      border: 2px solid #6b6f75;
      border-radius: 10px;
      color: #3a3d42;
      font-size: 1.1rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 3px 0 #5f6368;
      transition: all 0.1s ease;
    }
    
    .dpad-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #5f6368;
      background: linear-gradient(145deg, #9fa3a8, #d1d4d8);
    }
    
    .dpad-up { grid-column: 2; grid-row: 1; }
    .dpad-left { grid-column: 1; grid-row: 2; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down { grid-column: 2; grid-row: 3; }
    .dpad-center {
      grid-column: 2; grid-row: 2;
      background: #6b6f75;
      border-color: #4a4d52;
      color: transparent;
    }
    
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    
    .btn {
      background: linear-gradient(145deg, #d1d4d8, #9fa3a8);
      border: 2px solid #6b6f75;
      border-radius: 8px;
      padding: 6px 18px;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: #3a3d42;
      cursor: pointer;
      box-shadow: 0 2px 0 #5f6368;
    }
    
    .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #5f6368; }
    
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #a8b89a;
    }
    
    .stat { display: flex; flex-direction: column; align-items: center; }
    .stat-label { font-size: 0.7rem; opacity: 0.6; }
    .stat-value { font-size: 1.25rem; font-weight: bold; color: #1a201a; }
    
    .instructions {
      margin-top: 24px;
      font-size: 0.8rem;
      opacity: 0.55;
      text-align: center;
      max-width: 340px;
      line-height: 1.4;
    }
    
    .footer {
      margin-top: 40px;
      font-size: 0.75rem;
      opacity: 0.5;
    }
    
    .footer a { color: #00c4d4; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>NOKIA SNAKE II</h1>
    <p>Authentic 3310 • Modern movement</p>
  </div>

  <div class="phone-container">
    <!-- Speaker grille -->
    <div class="speaker">
      <div></div><div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

    <!-- Screen assembly -->
    <div class="lcd-frame">
      <div class="lcd-inner">
        <div class="lcd-header">
          <div>SNAKE II</div>
          <div style="font-size:10px;opacity:0.6">•••</div>
        </div>
        <div class="lcd-screen">
          <canvas id="game" width="480" height="320"></canvas>
        </div>
      </div>
    </div>

    <div class="nokia-brand">NOKIA</div>

    <!-- On-screen controls -->
    <div class="controls">
      <div class="stats">
        <div class="stat">
          <div class="stat-label">SCORE</div>
          <div id="score" class="stat-value">000</div>
        </div>
        <div class="stat">
          <div class="stat-label">HIGH</div>
          <div id="highscore" class="stat-value">000</div>
        </div>
      </div>

      <div class="dpad">
        <button class="dpad-btn dpad-up" data-dir="up">▲</button>
        <button class="dpad-btn dpad-left" data-dir="left">◀</button>
        <div class="dpad-btn dpad-center"></div>
        <button class="dpad-btn dpad-right" data-dir="right">▶</button>
        <button class="dpad-btn dpad-down" data-dir="down">▼</button>
      </div>

      <div class="actions">
        <button id="startBtn" class="btn">START</button>
        <button id="pauseBtn" class="btn">PAUSE</button>
        <button id="resetBtn" class="btn">RESET</button>
      </div>
    </div>
  </div>

  <div class="instructions">
    Arrow keys / WASD • P = Pause • Space = Restart<br>
    Tap the D-pad on mobile. Wrap-around edges. Eat the food.
  </div>

  <div class="footer">
    Standalone demo • <a href="https://kierz.io/game">Back to kierz.io</a> • 
    <a href="https://github.com/kierzio/snake-clone">Source</a>
  </div>

  <script>
    // === Standalone Nokia 3310 Snake II ===
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    const BOARD_X = 24;
    const BOARD_Y = 16;
    const CELL = 20; // 480x320
    
    let snake = [{x:12, y:8}];
    let food = {x:18, y:12};
    let dir = {x:1, y:0};
    let nextDir = {x:1, y:0};
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
    let running = false;
    let paused = false;
    let gameOver = false;
    let lastTick = 0;
    let animProgress = 0;
    
    const SPEED = 140; // ms per step
    
    function updateUI() {
      document.getElementById('score').textContent = score.toString().padStart(3, '0');
      document.getElementById('highscore').textContent = highScore.toString().padStart(3, '0');
    }
    
    function drawGrid() {
      ctx.fillStyle = '#b2c0a8';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = '#9aa88f';
      ctx.lineWidth = 1;
      for (let x = 0; x <= BOARD_X; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, BOARD_Y * CELL);
        ctx.stroke();
      }
      for (let y = 0; y <= BOARD_Y; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(BOARD_X * CELL, y * CELL);
        ctx.stroke();
      }
    }
    
    function draw() {
      drawGrid();
      
      // Draw snake with smooth interpolation
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        let drawX = seg.x * CELL;
        let drawY = seg.y * CELL;
        
        if (isHead && animProgress > 0 && running && !paused) {
          const nx = seg.x + dir.x;
          const ny = seg.y + dir.y;
          let wrapX = nx < 0 ? BOARD_X - 1 : nx >= BOARD_X ? 0 : nx;
          let wrapY = ny < 0 ? BOARD_Y - 1 : ny >= BOARD_Y ? 0 : ny;
          
          const currX = seg.x * CELL;
          const currY = seg.y * CELL;
          const targetX = wrapX * CELL;
          const targetY = wrapY * CELL;
          
          const dx = Math.abs(targetX - currX);
          const dy = Math.abs(targetY - currY);
          
          if (dx > canvas.width / 2) {
            drawX = seg.x < BOARD_X / 2 ? currX + dx * animProgress : currX - dx * animProgress;
          } else {
            drawX = currX + (targetX - currX) * animProgress;
          }
          if (dy > canvas.height / 2) {
            drawY = seg.y < BOARD_Y / 2 ? currY + dy * animProgress : currY - dy * animProgress;
          } else {
            drawY = currY + (targetY - currY) * animProgress;
          }
        }
        
        const padding = isHead ? 1.5 : 2.5;
        const size = CELL - padding * 2;
        
        // Modern gradient snake
        const grad = ctx.createLinearGradient(drawX, drawY, drawX + CELL, drawY + CELL);
        grad.addColorStop(0, isHead ? '#00C4D4' : '#B875F8');
        grad.addColorStop(1, isHead ? '#1a201a' : '#2a3128');
        
        ctx.fillStyle = grad;
        ctx.fillRect(drawX + padding, drawY + padding, size, size);
        
        // Subtle highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(drawX + padding + 1, drawY + padding + 1, size - 2, 3);
      });
      
      // Food (modern glowing)
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#3BD573';
      const fGrad = ctx.createRadialGradient(
        food.x * CELL + CELL/2, food.y * CELL + CELL/2, 2,
        food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2
      );
      fGrad.addColorStop(0, '#3BD573');
      fGrad.addColorStop(1, '#00C4D4');
      ctx.fillStyle = fGrad;
      ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
      ctx.shadowBlur = 0;
    }
    
    function placeFood(currentSnake) {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * BOARD_X),
          y: Math.floor(Math.random() * BOARD_Y)
        };
      } while (currentSnake.some(s => s.x === pos.x && s.y === pos.y));
      return pos;
    }
    
    function tick() {
      if (!running || paused || gameOver) return;
      
      const head = {...snake[0]};
      const newHead = { x: head.x + nextDir.x, y: head.y + nextDir.y };
      
      // Wrap
      if (newHead.x < 0) newHead.x = BOARD_X - 1;
      if (newHead.x >= BOARD_X) newHead.x = 0;
      if (newHead.y < 0) newHead.y = BOARD_Y - 1;
      if (newHead.y >= BOARD_Y) newHead.y = 0;
      
      // Self collision
      if (snake.some((seg, i) => i > 0 && seg.x === newHead.x && seg.y === newHead.y)) {
        endGame();
        return;
      }
      
      snake.unshift(newHead);
      dir = {...nextDir};
      
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        food = placeFood(snake);
      } else {
        snake.pop();
      }
      
      updateUI();
    }
    
    let raf = null;
    function loop(ts = 0) {
      if (!running || paused || gameOver) {
        raf = null;
        return;
      }
      
      if (lastTick === 0) lastTick = ts;
      
      const elapsed = ts - lastTick;
      animProgress = Math.min(elapsed / SPEED, 1);
      
      draw();
      
      if (elapsed >= SPEED) {
        tick();
        lastTick = ts;
        animProgress = 0;
      }
      
      raf = requestAnimationFrame(loop);
    }
    
    function start() {
      if (gameOver) reset();
      running = true;
      paused = false;
      lastTick = 0;
      animProgress = 0;
      document.getElementById('startBtn').textContent = 'RESTART';
      loop();
    }
    
    function pause() {
      if (!running || gameOver) return;
      paused = !paused;
      document.getElementById('pauseBtn').textContent = paused ? 'RESUME' : 'PAUSE';
      if (!paused) {
        lastTick = 0;
        loop();
      }
    }
    
    function reset() {
      snake = [{x:12, y:8}];
      food = {x:18, y:12};
      dir = {x:1, y:0};
      nextDir = {x:1, y:0};
      score = 0;
      running = false;
      paused = false;
      gameOver = false;
      animProgress = 0;
      lastTick = 0;
      document.getElementById('startBtn').textContent = 'START';
      document.getElementById('pauseBtn').textContent = 'PAUSE';
      updateUI();
      draw();
    }
    
    function endGame() {
      gameOver = true;
      running = false;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
      }
      updateUI();
      
      ctx.fillStyle = 'rgba(15,18,15,0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1a201a';
      ctx.font = 'bold 28px VT323, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
      ctx.font = '20px VT323, monospace';
      ctx.fillText(`SCORE: ${score}`, canvas.width/2, canvas.height/2 + 20);
    }
    
    // Input
    function setDirection(newDir) {
      if ((newDir.x === -dir.x && newDir.y === dir.y) || 
          (newDir.x === dir.x && newDir.y === -dir.y)) return;
      nextDir = newDir;
    }
    
    window.addEventListener('keydown', e => {
      if (['ArrowUp','w','W'].includes(e.key)) setDirection({x:0,y:-1});
      if (['ArrowDown','s','S'].includes(e.key)) setDirection({x:0,y:1});
      if (['ArrowLeft','a','A'].includes(e.key)) setDirection({x:-1,y:0});
      if (['ArrowRight','d','D'].includes(e.key)) setDirection({x:1,y:0});
      
      if (e.key.toLowerCase() === 'p') pause();
      if (e.key === ' ') {
        e.preventDefault();
        if (!running || gameOver) start(); else pause();
      }
    });
    
    // Touch D-pad
    document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => {
        const d = btn.dataset.dir;
        if (d === 'up') setDirection({x:0,y:-1});
        if (d === 'down') setDirection({x:0,y:1});
        if (d === 'left') setDirection({x:-1,y:0});
        if (d === 'right') setDirection({x:1,y:0});
      });
    });
    
    // Buttons
    document.getElementById('startBtn').addEventListener('click', start);
    document.getElementById('pauseBtn').addEventListener('click', pause);
    document.getElementById('resetBtn').addEventListener('click', reset);
    
    // Boot
    updateUI();
    draw();
    canvas.setAttribute('aria-label', 'Nokia 3310 Snake game canvas');
    
    // Easter egg: click header to reset high score
    document.querySelector('.header').addEventListener('click', () => {
      if (confirm('Reset high score?')) {
        localStorage.removeItem('snakeHighScore');
        highScore = 0;
        updateUI();
      }
    });
  </script>
</body>
</html>
